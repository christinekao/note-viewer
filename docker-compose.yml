services:
  note-viewer:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ${VAULT_PATH}:/vault
    environment:
      - VAULT_PATH=/vault
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/notes"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
